services:
  backend:
    build:
      context: .
      dockerfile: ./fllee-backend/Dockerfile
    env_file:
      - ./fllee-backend/.env
    environment:
      DATABASE_URL: file:/app/data/fleebee.db
    ports:
      - "4100:4100"
    volumes:
      - fleebee_backend_data:/app/data
    restart: unless-stopped

volumes:
  fleebee_backend_data:
